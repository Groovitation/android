stages:
  - build
  - test
  - deploy

variables:
  ANDROID_COMPILE_SDK: "35"
  ANDROID_BUILD_TOOLS: "35.0.0"
  ANDROID_SDK_TOOLS: "11076708"
  ANDROID_FIXTURE_BASE_URL: "http://10.0.2.2:3000"

# Auto-retry jobs that never start because the shared runner is temporarily unavailable.
default:
  retry:
    max: 2
    when:
      - stuck_or_timeout_failure

# Shell executor setup — uses shared SDK at /home/ben/Android/Sdk (same as core CI)
.android_setup: &android_setup
  before_script:
    - |
      set -euo pipefail
      write_google_services_json() {
        local out_file="app/google-services.json"
        mkdir -p app
        write_stub_google_services_json() {
          printf '%s\n' '{"project_info":{"project_number":"1234567890","project_id":"groovitation-ci","storage_bucket":"groovitation-ci.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:1234567890:android:ci-placeholder","android_client_info":{"package_name":"io.blaha.groovitation"}},"oauth_client":[],"api_key":[{"current_key":"ci-placeholder-key"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > "${out_file}"
        }

        if [ -n "${GOOGLE_SERVICES_JSON_B64:-}" ]; then
          printf '%s' "${GOOGLE_SERVICES_JSON_B64}" | tr -d '\r\n ' | base64 -d > "${out_file}" || {
            echo "ERROR: GOOGLE_SERVICES_JSON_B64 could not be base64-decoded"
            exit 1
          }
          return 0
        fi

        if [ -z "${GOOGLE_SERVICES_JSON:-}" ]; then
          if [ "${CI_COMMIT_BRANCH:-}" = "main" ]; then
            echo "ERROR: Missing Google services config on main. Set GOOGLE_SERVICES_JSON_B64 (preferred) or GOOGLE_SERVICES_JSON."
            exit 1
          fi
          echo "WARN: Missing Google services config on branch build; generating CI placeholder google-services.json"
          write_stub_google_services_json
          return 0
        fi

        # Primary path: literal JSON stored in CI variable.
        printf '%s' "${GOOGLE_SERVICES_JSON}" > "${out_file}"

        # Some CI setups store JSON with escaped newlines/quotes; retry after unescaping if needed.
        if ! python3 -m json.tool "${out_file}" >/dev/null 2>&1; then
          printf '%b' "${GOOGLE_SERVICES_JSON}" > "${out_file}"
        fi
      }

      write_google_services_json
      if ! python3 -m json.tool app/google-services.json >/dev/null 2>&1; then
        bytes="$(wc -c < app/google-services.json | tr -d ' ')"
        echo "ERROR: app/google-services.json is not valid JSON (bytes=${bytes})."
        echo "Set GOOGLE_SERVICES_JSON_B64 to a base64-encoded JSON payload to avoid formatting issues."
        exit 1
      fi
    - export ANDROID_HOME="/home/ben/Android/Sdk"
    - export ANDROID_AVD_HOME="/home/ben/.android/avd"
    - export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator
    - chmod +x ./gradlew

build:
  <<: *android_setup
  stage: build
  script:
    - 'echo "Build contract: prodDebug APK targets https://groovitation.blaha.io"'
    - 'echo "Build contract: localDebug APK targets fixture backend ${ANDROID_FIXTURE_BASE_URL}"'
    - ./gradlew assembleProdDebug assembleLocalDebug --no-daemon -PgroovitationLocalBaseUrl="${ANDROID_FIXTURE_BASE_URL}"
  artifacts:
    paths:
      - app/build/outputs/apk/prod/debug/app-prod-debug.apk
      - app/build/outputs/apk/local/debug/app-local-debug.apk
    expire_in: 1 week

test:
  <<: *android_setup
  stage: test
  script:
    - 'echo "Unit test contract: prodDebug coverage plus localDebug fixture lane coverage"'
    - 'echo "Fixture backend under test: ${ANDROID_FIXTURE_BASE_URL}"'
    - ./gradlew testProdDebugUnitTest testLocalDebugUnitTest --no-daemon -PgroovitationLocalBaseUrl="${ANDROID_FIXTURE_BASE_URL}"
  artifacts:
    reports:
      junit:
        - app/build/test-results/testProdDebugUnitTest/*.xml
        - app/build/test-results/testLocalDebugUnitTest/*.xml

lint:
  <<: *android_setup
  stage: test
  script:
    - ./gradlew lintProdDebug --no-daemon
  artifacts:
    paths:
      - app/build/reports/lint-results-prodDebug.html
    expire_in: 1 week
  allow_failure: true

emulator-slot-claim:
  <<: *android_setup
  stage: test
  timeout: 90 minutes
  needs:
    - job: build
      artifacts: false
    - job: test
      artifacts: false
  script:
    - |
      CLAIMED_EMU_PORT=$(bash scripts/android-emulator-slots.sh claim "$CI_PIPELINE_ID")
      if [ -z "$CLAIMED_EMU_PORT" ]; then
        echo "ERROR: Could not claim emulator slot"
        exit 1
      fi
      echo "Claimed emulator slot port=${CLAIMED_EMU_PORT}"
      echo "$CLAIMED_EMU_PORT" > emulator-slot.txt
  artifacts:
    paths:
      - emulator-slot.txt
    expire_in: 2 hours

emulator-smoke-test:
  <<: *android_setup
  stage: test
  timeout: 45 minutes
  needs:
    - job: emulator-slot-claim
      artifacts: true
  # A pipeline-held emulator slot is pre-claimed by emulator-slot-claim so
  # this wall clock is spent on emulator boot + tests, not queue wait.
  script:
    - 'echo "Native emulator lane: localDebug fixture-backed checks"'
    - 'echo "APK under test: localDebug"'
    - 'echo "Backend under test: dynamic fixture URL passed via groovitationLocalBaseUrl"'
    - 'echo "Production-only smoke remains in root/groovitation post-deploy smoke-test-android."'
    # Ensure emulator child processes are killed on cancel/timeout
    - |
      cleanup_on_signal() {
        echo "Caught signal, killing emulator..."
        EMU_PORT=$(cat /tmp/emu-port-${CI_JOB_ID} 2>/dev/null || echo "")
        FIXTURE_PID=$(cat /tmp/avatar-fixture-${CI_JOB_ID}.pid 2>/dev/null || echo "")
        if [ -n "$FIXTURE_PID" ]; then
          kill "$FIXTURE_PID" 2>/dev/null || true
        fi
        if [ -n "$EMU_PORT" ]; then
          adb -s "emulator-${EMU_PORT}" emu kill 2>/dev/null || true
          [ -f "/tmp/emulator-${EMU_PORT}.pid" ] && kill -9 "$(cat "/tmp/emulator-${EMU_PORT}.pid")" 2>/dev/null || true
          pkill -9 -f "emulator.*-port ${EMU_PORT}" 2>/dev/null || true
        fi
        exit 1
      }
      trap cleanup_on_signal TERM INT
    # Read emulator slot claimed by the emulator-slot-claim gate job.
    # On retry, keep using the same pipeline-held port when available.
    - |
      if [ ! -f emulator-slot.txt ]; then
        echo "ERROR: emulator-slot.txt not found — emulator-slot-claim job failed?"
        exit 1
      fi
      PREFERRED_EMU_PORT=$(cat emulator-slot.txt)
      EMU_LOCK_FILE="/tmp/android-emulator-slots/slot-${PREFERRED_EMU_PORT}.lock"
      if [ -f "$EMU_LOCK_FILE" ] && [ "$(cat "$EMU_LOCK_FILE")" = "$CI_PIPELINE_ID" ]; then
        export EMU_PORT="$PREFERRED_EMU_PORT"
        echo "Using pre-claimed emulator slot port=${EMU_PORT}"
      else
        echo "Emulator slot lock lost (retry?), re-claiming..."
        CLAIMED_EMU_PORT=$(ANDROID_EMULATOR_SLOT_CLAIM_TIMEOUT="${ANDROID_EMULATOR_SLOT_RECLAIM_TIMEOUT:-300}" \
          bash scripts/android-emulator-slots.sh claim "$CI_PIPELINE_ID" "$PREFERRED_EMU_PORT")
        if [ -z "$CLAIMED_EMU_PORT" ]; then
          echo "ERROR: Could not re-claim emulator slot"
          exit 1
        fi
        export EMU_PORT="$CLAIMED_EMU_PORT"
        echo "Re-claimed emulator slot port=${EMU_PORT}"
      fi
      export ANDROID_SERIAL="emulator-${EMU_PORT}"
      exec {LEGACY_EMU_LOCK_FD}>"/tmp/android-emulator-${EMU_PORT}.lock"
      if ! flock -w "${ANDROID_EMULATOR_LEGACY_FLOCK_TIMEOUT:-300}" "$LEGACY_EMU_LOCK_FD"; then
        echo "ERROR: Could not acquire legacy emulator lock for port ${EMU_PORT}"
        exit 1
      fi
      echo "Holding legacy emulator flock for port=${EMU_PORT}"
      echo "$EMU_PORT" > /tmp/emu-port-${CI_JOB_ID}
      echo "$EMU_PORT" > /tmp/android-emulator-slot-${CI_JOB_ID}
      echo "Using reserved emulator slot: port=${EMU_PORT} serial=${ANDROID_SERIAL}"
    # Kill stale emulator on our port only (don't touch other slots)
    - |
      adb -s "${ANDROID_SERIAL}" emu kill 2>/dev/null || true
      pkill -f "emulator.*-port ${EMU_PORT}" 2>/dev/null || true
      # Force-kill anything holding our emulator ports (console + adb)
      fuser -k "${EMU_PORT}/tcp" 2>/dev/null || true
      fuser -k "$((EMU_PORT + 1))/tcp" 2>/dev/null || true
      sleep 2
    # Clean stale overlay/lock files from the shared AVD
    - |
      AVD_DIR="${ANDROID_AVD_HOME}/ci-api35.avd"
      rm -f "${AVD_DIR}/multiinstance.lock" "${AVD_DIR}/hardware-qemu.ini.lock" 2>/dev/null || true
      rm -f "${AVD_DIR}/"*.qcow2 2>/dev/null || true
      rm -f "${AVD_DIR}/quickbootChoice.ini" "${AVD_DIR}/emulator-user.ini" "${AVD_DIR}/read-snapshot.txt" 2>/dev/null || true
      rm -rf "${AVD_DIR}/snapshots/default_boot" 2>/dev/null || true
    # Cold boot emulator with a read-only overlay so it can coexist with
    # root/groovitation's 5554 lane on the same shared ci-api35 AVD.
    - |
      echo "Booting emulator (cold boot) on port ${EMU_PORT}..."
      emulator @ci-api35 -port "${EMU_PORT}" \
        -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect \
        -no-snapshot-load -no-snapshot-save -read-only > /tmp/emulator-${EMU_PORT}.log 2>&1 &
      EMULATOR_PID=$!
      echo "Started emulator PID=${EMULATOR_PID} on port ${EMU_PORT}"
      echo "${EMULATOR_PID}" > /tmp/emulator-${EMU_PORT}.pid
    - adb -s "${ANDROID_SERIAL}" wait-for-device
    - |
      boot_timeout=120
      waited=0
      until [ "$(adb -s "${ANDROID_SERIAL}" shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = "1" ]; do
        sleep 5
        waited=$((waited+5))
        if [ "$waited" -ge "$boot_timeout" ]; then
          echo "ERROR: Emulator did not finish booting within ${boot_timeout}s"
          exit 1
        fi
      done
    - adb -s "${ANDROID_SERIAL}" shell settings put global window_animation_scale 0
    - adb -s "${ANDROID_SERIAL}" shell settings put global transition_animation_scale 0
    - adb -s "${ANDROID_SERIAL}" shell settings put global animator_duration_scale 0
    - |
      # Aggressively remove any pre-existing APK to avoid INSTALL_FAILED_UPDATE_INCOMPATIBLE
      for pkg in io.blaha.groovitation io.blaha.groovitation.test; do
        adb -s "${ANDROID_SERIAL}" uninstall "$pkg" 2>/dev/null || true
        adb -s "${ANDROID_SERIAL}" shell pm uninstall --user 0 "$pkg" 2>/dev/null || true
        adb -s "${ANDROID_SERIAL}" shell pm uninstall "$pkg" 2>/dev/null || true
        adb -s "${ANDROID_SERIAL}" shell pm clear "$pkg" 2>/dev/null || true
      done
      if adb -s "${ANDROID_SERIAL}" shell pm list packages 2>/dev/null | grep -q io.blaha.groovitation; then
        echo "WARN: Package still installed after uninstall attempts, force-removing"
        adb -s "${ANDROID_SERIAL}" shell rm -rf /data/app/*/io.blaha.groovitation* 2>/dev/null || true
      fi
    - |
      FIXTURE_PORT=$(python3 -c "import socket; sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM); sock.bind(('127.0.0.1', 0)); print(sock.getsockname()[1]); sock.close()")
      export FIXTURE_PORT
      mkdir -p build/ci-logs
      python3 scripts/avatar_fixture_server.py --host 127.0.0.1 --port "${FIXTURE_PORT}" \
        > build/ci-logs/avatar-fixture-server.log 2>&1 &
      echo "$!" > /tmp/avatar-fixture-${CI_JOB_ID}.pid
      for _ in $(seq 1 30); do
        if curl -sf "http://127.0.0.1:${FIXTURE_PORT}/healthz" >/dev/null; then
          break
        fi
        sleep 1
      done
      curl -sf "http://127.0.0.1:${FIXTURE_PORT}/healthz" >/dev/null
      echo "Fixture backend under test: http://10.0.2.2:${FIXTURE_PORT}"
    - ./gradlew connectedLocalDebugAndroidTest --no-daemon -PgroovitationLocalBaseUrl="http://10.0.2.2:${FIXTURE_PORT}" -Pandroid.testInstrumentationRunnerArguments.notClass=io.blaha.groovitation.MainActivityWebStylingInstrumentedTest
    - |
      timeout 10s adb -s "${ANDROID_SERIAL}" emu kill || true
      if [ -f "/tmp/emulator-${EMU_PORT}.pid" ]; then kill "$(cat "/tmp/emulator-${EMU_PORT}.pid")" 2>/dev/null || true; fi
  after_script:
    - export ANDROID_HOME="/home/ben/Android/Sdk"
    - export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator
    - |
      if [ -f "/tmp/avatar-fixture-${CI_JOB_ID}.pid" ]; then
        kill "$(cat "/tmp/avatar-fixture-${CI_JOB_ID}.pid")" 2>/dev/null || true
      fi
      EMU_PORT=$(cat /tmp/emu-port-${CI_JOB_ID} 2>/dev/null || echo "")
      if [ -n "$EMU_PORT" ]; then
        adb -s "emulator-${EMU_PORT}" emu kill 2>/dev/null || true
        pkill -f "emulator.*-port ${EMU_PORT}" 2>/dev/null || true
        [ -f "/tmp/emulator-${EMU_PORT}.pid" ] && kill "$(cat "/tmp/emulator-${EMU_PORT}.pid")" 2>/dev/null || true
      else
        # Port file missing — clean up both slots
        for p in 5556 5558; do
          adb -s "emulator-${p}" emu kill 2>/dev/null || true
          pkill -f "emulator.*-port ${p}" 2>/dev/null || true
        done
      fi
      if [ -f "/tmp/android-emulator-slot-${CI_JOB_ID}" ]; then
        CLAIMED_EMU_PORT=$(cat "/tmp/android-emulator-slot-${CI_JOB_ID}")
        if [ "${CI_JOB_STATUS:-}" = "success" ] || [ "${CI_JOB_STATUS:-}" = "canceled" ]; then
          bash scripts/android-emulator-slots.sh release "$CLAIMED_EMU_PORT" "$CI_PIPELINE_ID"
        else
          echo "Keeping emulator slot $CLAIMED_EMU_PORT for retry (status=${CI_JOB_STATUS:-unknown})"
        fi
        rm -f "/tmp/android-emulator-slot-${CI_JOB_ID}"
      fi
  artifacts:
    reports:
      junit:
        - app/build/outputs/androidTest-results/**/*.xml
    paths:
      - build/ci-logs/avatar-fixture-server.log

# #797: Firebase Test Lab nightly on a physical Samsung Galaxy S24.
#
# Why a separate job (not folded into emulator-smoke-test):
#   - Emulators cannot reproduce OneUI throttling, Samsung's "Put unused apps
#     to sleep" thresholds, or OEM FusedLocationProvider radio behaviour with
#     the screen off. These are the dominant class of "works on my device,
#     silent in prod" location bugs (scruff3 2026-04-23 investigation on
#     Ben's S24+).
#   - Physical-device cloud runs cost ~$1–5/day on FTL — too much for every
#     PR. Schedule-only run keeps the cost predictable and lets per-PR CI
#     stay emulator-only.
#
# Trigger: scheduled pipeline only (rules: schedule). Manual trigger is
# also exposed via `when: manual` so a maintainer can fire it from the
# pipeline UI when investigating an OEM-shaped bug between nightlies.
#
# Authentication: gcloud uses GOOGLE_APPLICATION_CREDENTIALS pointing at a
# decoded service-account key (FTL_SERVICE_ACCOUNT_KEY_B64 → JSON file).
# The service account needs:
#   - roles/firebase.testLabAdmin on the project
#   - access to the Cloud Storage bucket configured below
#
# Test surface: instrumentation tests (the same suite emulator-smoke-test
# runs locally) plus a Robo crawl. Robo is automatic — no test code, exists
# specifically to catch OEM-induced ANRs/crashes that the assertion-based
# tests don't yet reach.
#
# Runbook: docs/firebase-test-lab-nightly.md
firebase-test-lab-nightly:
  <<: *android_setup
  stage: test
  timeout: 90 minutes
  rules:
    # Run automatically only on the nightly scheduled pipeline.
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $CI_COMMIT_REF_NAME == "main"'
      when: always
    # Allow manual fire from the pipeline UI for one-off investigations.
    - when: manual
      allow_failure: true
  needs:
    - job: build
      artifacts: true
  variables:
    # Galaxy S24 (US carrier model). Available in Firebase's catalog at
    # https://firebase.google.com/docs/test-lab/android/available-testing-devices.
    # Override with FTL_DEVICE_OVERRIDE in the schedule's variables to chase
    # a specific OneUI version when a regression report comes in.
    FTL_DEVICE_MODEL: "${FTL_DEVICE_MODEL:-SM-S921U}"
    FTL_DEVICE_VERSION: "${FTL_DEVICE_VERSION:-34}"
    FTL_LOCALE: "en_US"
    FTL_ORIENTATION: "portrait"
    # Where FTL stores per-run artefacts inside its results bucket.
    FTL_RESULTS_DIR_PREFIX: "ci-nightly"
  script:
    - |
      set -euo pipefail
      # ── Auth ─────────────────────────────────────────────────────────
      if [ -z "${FTL_SERVICE_ACCOUNT_KEY_B64:-}" ]; then
        echo "ERROR: FTL_SERVICE_ACCOUNT_KEY_B64 not set in CI variables — cannot authenticate to Firebase Test Lab"
        exit 1
      fi
      if [ -z "${FTL_GCP_PROJECT_ID:-}" ]; then
        echo "ERROR: FTL_GCP_PROJECT_ID not set — cannot route the FTL run to a billing project"
        exit 1
      fi
      mkdir -p build/firebase-test-lab
      KEY_PATH="$(pwd)/build/firebase-test-lab/sa-key.json"
      printf '%s' "${FTL_SERVICE_ACCOUNT_KEY_B64}" | tr -d '\r\n ' | base64 -d > "${KEY_PATH}"
      export GOOGLE_APPLICATION_CREDENTIALS="${KEY_PATH}"
      gcloud auth activate-service-account --key-file="${KEY_PATH}"
      gcloud config set project "${FTL_GCP_PROJECT_ID}"
    - |
      # ── Build the test APK alongside the app APK from `build`. The job
      #    already produced the prod-debug app APK as an artefact; FTL's
      #    instrumentation lane needs the matching androidTest APK too.
      ./gradlew assembleProdDebugAndroidTest --no-daemon
    - |
      APP_APK="app/build/outputs/apk/prod/debug/app-prod-debug.apk"
      TEST_APK="app/build/outputs/apk/androidTest/prod/debug/app-prod-debug-androidTest.apk"
      if [ ! -f "${APP_APK}" ]; then
        echo "ERROR: app APK missing at ${APP_APK}"
        exit 1
      fi
      if [ ! -f "${TEST_APK}" ]; then
        echo "ERROR: test APK missing at ${TEST_APK}"
        exit 1
      fi
      ls -la "${APP_APK}" "${TEST_APK}"
    - |
      # ── Robo crawl. No test code — Firebase's automated UI explorer
      #    drives the app for ~5 minutes and surfaces ANRs/crashes that
      #    OEM throttling or OneUI-specific WebView patches cause. This
      #    is the "broad smoke" half of the nightly.
      RUN_ID="nightly-$(date +%Y%m%d-%H%M%S)"
      ROBO_RESULTS_DIR="${FTL_RESULTS_DIR_PREFIX}/${RUN_ID}/robo"
      echo "Submitting Robo crawl to FTL (device=${FTL_DEVICE_MODEL}, api=${FTL_DEVICE_VERSION})..."
      gcloud firebase test android run \
        --type robo \
        --app "${APP_APK}" \
        --device "model=${FTL_DEVICE_MODEL},version=${FTL_DEVICE_VERSION},locale=${FTL_LOCALE},orientation=${FTL_ORIENTATION}" \
        --results-dir "${ROBO_RESULTS_DIR}" \
        --timeout "5m" \
        2>&1 | tee build/firebase-test-lab/robo.log
    - |
      # ── Instrumentation suite. Same tests emulator-smoke-test runs,
      #    but on a real S24. The location/Doze/AppStandby tests are the
      #    ones that catch OEM regressions; the rest serve as a smoke
      #    layer that the build is sound on real hardware.
      RUN_ID_INST="nightly-$(date +%Y%m%d-%H%M%S)"
      INST_RESULTS_DIR="${FTL_RESULTS_DIR_PREFIX}/${RUN_ID_INST}/instrumentation"
      APP_APK="app/build/outputs/apk/prod/debug/app-prod-debug.apk"
      TEST_APK="app/build/outputs/apk/androidTest/prod/debug/app-prod-debug-androidTest.apk"
      echo "Submitting instrumentation suite to FTL..."
      gcloud firebase test android run \
        --type instrumentation \
        --app "${APP_APK}" \
        --test "${TEST_APK}" \
        --device "model=${FTL_DEVICE_MODEL},version=${FTL_DEVICE_VERSION},locale=${FTL_LOCALE},orientation=${FTL_ORIENTATION}" \
        --results-dir "${INST_RESULTS_DIR}" \
        --timeout "30m" \
        --use-orchestrator \
        --environment-variables "clearPackageData=true" \
        2>&1 | tee build/firebase-test-lab/instrumentation.log
  after_script:
    # Scrub the service-account key off the runner so a runner takeover can't
    # exfiltrate it. The artefact upload below filters it out via path; this
    # is the belt to that braces.
    - rm -f build/firebase-test-lab/sa-key.json || true
  artifacts:
    when: always
    paths:
      - build/firebase-test-lab/robo.log
      - build/firebase-test-lab/instrumentation.log
    expire_in: 30 days

deploy:
  stage: deploy
  dependencies:
    - build
  variables:
    DEPLOY_HOST: "192.168.1.124"
  before_script:
    - mkdir -p ~/.ssh
    - echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - |
      VERSION_ENV_PATH=version.env ./scripts/generate-version-json.sh version.json
      set -a
      source version.env
      set +a
      cp app/build/outputs/apk/prod/debug/app-prod-debug.apk "${APK_NAME}"
      cp app/build/outputs/apk/prod/debug/app-prod-debug.apk groovitation.apk
      rsync -avz "${APK_NAME}" groovitation.apk version.json ben@${DEPLOY_HOST}:/media/nvme/docker_volumes/groovitation-android/
  only:
    - main
  environment:
    name: production
    url: https://groovitation.blaha.io/android
